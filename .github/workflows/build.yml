name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          NAME="${{ github.event.repository.name }}-${{ github.ref_name || 'dev' }}.zip"
          # -x ".git*" handles .git/ directory contents; *.zip prevents
          # the zip from including itself if a previous run left one behind.
          zip -r "$NAME" . \
            -x ".git*" "*.md" "*.py" "*.bak" "*.mhtml" "userscript/*" "*.sh" "*.zip"
          ls -la "$NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterNext-extension
          path: "*.zip"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" *.zip --clobber
          else
            gh release create "$TAG" *.zip --generate-notes --title "$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
